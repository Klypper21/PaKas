<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión - PaKas</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="back-btn-mobile">&larr; Volver a la tienda</a>
    <a href="index.html" class="logo">
      <picture>
        <source media="(max-width: 768px)" srcset="img/logo-paka.png">
        <img src="img/pakas name.png" alt="PaKas">
      </picture>
    </a>
    <button class="hamburger" aria-label="Menú">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <div class="nav-links">
      <a href="index.html" class="nav-link">
        <span class="nav-icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </span>
        <span class="nav-text">Volver a la tienda</span>
      </a>
    </div>
  </nav>

  <main class="auth-container">
    <div class="auth-card">
      <div class="auth-card-header">
        <a href="index.html">
          <img class="auth-logo" src="img/pakas name.png" alt="PaKas">
        </a>
        <p>Accede a tu cuenta o regístrate</p>
      </div>
      <div class="auth-tabs">
        <button class="tab active" data-tab="login">Iniciar sesión</button>
        <button class="tab" data-tab="register">Registrarse</button>
      </div>

      <div id="login-form" class="auth-form">
        <h2>Iniciar sesión</h2>
        <form id="form-login">
          <input type="text" name="identifier" placeholder="Correo electrónico o teléfono" required autocomplete="username">
          <input type="password" name="password" placeholder="Contraseña" required autocomplete="current-password">
          <button type="submit" class="btn btn-primary btn-block">Entrar</button>
        </form>
        <p id="login-error" class="error-msg"></p>
      </div>

      <div id="register-form" class="auth-form hidden">
        <h2>Crear cuenta</h2>
        <form id="form-register">
          <input type="text" name="name" placeholder="Nombre completo" required autocomplete="name">
          <input type="tel" name="phone" placeholder="Teléfono" required autocomplete="tel">
          <input type="text" name="identifier" placeholder="Correo electrónico o teléfono" required autocomplete="username">
          <input type="password" name="password" placeholder="Contraseña (mín. 6 caracteres)" required minlength="6" autocomplete="new-password">
          <input type="text" name="address" placeholder="Dirección (calle, número, ciudad, CP)">
          <button type="submit" class="btn btn-primary btn-block">Registrarse</button>
        </form>
        <p id="register-error" class="error-msg"></p>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>

    // Tabs
    document.querySelectorAll('.tab').forEach(tab => {
      tab.onclick = () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.auth-form').forEach(f => f.classList.add('hidden'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab + '-form').classList.remove('hidden');
      };
    });

    document.getElementById('form-login').onsubmit = async (e) => {
      e.preventDefault();
      const form = e.target;
      const err = document.getElementById('login-error');
      err.textContent = '';
      const { identifier, password } = Object.fromEntries(new FormData(form));
      const { error } = await Auth.login((identifier || '').trim(), password);
      if (error) { err.textContent = error; return; }
      const redirect = new URLSearchParams(location.search).get('redirect');
      if (redirect && redirect !== 'admin.html') { location.href = redirect; return; }
      if (await Auth.isAdmin()) location.href = 'admin.html';
      else location.href = redirect || 'index.html';
    };

    document.getElementById('form-register').onsubmit = async (e) => {
      e.preventDefault();
      const form = e.target;
      const err = document.getElementById('register-error');
      err.textContent = '';
      const { name, identifier, password, phone, address } = Object.fromEntries(new FormData(form));
      const { data, error } = await Auth.register((identifier || '').trim(), password, (name || '').trim(), address || '');
      if (error) { err.textContent = error; return; }
      if (data?.user) {
        const { error: profileErr } = await Auth.ensureProfile({
          full_name: (name || '').trim(),
          phone: (phone || '').trim(),
          address: (address || '').trim(),
        });
        if (profileErr) { err.textContent = profileErr; return; }
      }
      const cleanIdentifier = (identifier || '').trim();
      const isEmail = cleanIdentifier.includes('@');

      if (isEmail) {
        // Registro con correo: pedir verificación antes de entrar.
        if (window.UI?.openModal) {
          UI.openModal({
            title: 'Verifica tu correo',
            html: `
              <p class="ui-modal__text">
                Te enviamos un correo a <strong>${cleanIdentifier.replace(/</g, '&lt;')}</strong>.
                Abre el enlace para activar tu cuenta y luego inicia sesión.
              </p>
              <p class="ui-modal__text" style="margin-bottom:0">
                Si no lo ves, revisa <strong>spam</strong> o <strong>promociones</strong>.
              </p>
            `,
            actions: [
              {
                label: 'Entendido',
                variant: 'primary',
                onClick: () => {
                  // Cambiar a pestaña de login
                  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                  document.querySelectorAll('.auth-form').forEach(f => f.classList.add('hidden'));
                  const loginTab = document.querySelector('.tab[data-tab="login"]');
                  if (loginTab) loginTab.classList.add('active');
                  document.getElementById('login-form')?.classList.remove('hidden');
                }
              }
            ]
          });
        }
        UI?.toast?.('Cuenta creada. Verifica tu correo para continuar.', 'success');
        form.reset();
        return;
      }

      const redirect = new URLSearchParams(location.search).get('redirect');
      if (await Auth.isAdmin()) location.href = 'admin.html';
      else location.href = redirect || 'index.html';
    };

  </script>
</body>
</html>
