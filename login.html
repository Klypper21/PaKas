<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión - PaKas</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="logo">
      <picture>
        <source media="(max-width: 768px)" srcset="img/logo paka.png">
        <img src="img/pakas name.png" alt="PaKas">
      </picture>
    </a>
    <button class="hamburger" aria-label="Menú">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <div class="nav-links">
      <a href="index.html" class="nav-link">
        <span class="nav-icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </span>
        <span class="nav-text">Volver a la tienda</span>
      </a>
    </div>
  </nav>

  <main class="auth-container">
    <div class="auth-card">
      <div class="auth-card-header">
        <a href="index.html">
          <img class="auth-logo" src="img/pakas name.png" alt="PaKas">
        </a>
        <p>Accede a tu cuenta o regístrate</p>
      </div>
      <div class="auth-tabs">
        <button class="tab active" data-tab="login">Iniciar sesión</button>
        <button class="tab" data-tab="register">Registrarse</button>
      </div>

      <div id="login-form" class="auth-form">
        <h2>Iniciar sesión</h2>
        <form id="form-login">
          <input type="email" name="email" placeholder="Correo electrónico" required autocomplete="email">
          <input type="password" name="password" placeholder="Contraseña" required autocomplete="current-password">
          <button type="submit" class="btn btn-primary btn-block">Entrar</button>
        </form>
        <p class="auth-divider">o continuar con</p>
        <button type="button" id="btn-google-login" class="btn-google" aria-label="Iniciar sesión con Google">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Google
        </button>
        <p id="login-error" class="error-msg"></p>
      </div>

      <div id="register-form" class="auth-form hidden">
        <h2>Crear cuenta</h2>
        <form id="form-register">
          <input type="text" name="name" placeholder="Nombre completo" required autocomplete="name">
          <input type="tel" name="phone" placeholder="Teléfono" required autocomplete="tel">
          <input type="email" name="email" placeholder="Correo electrónico" required autocomplete="email">
          <input type="password" name="password" placeholder="Contraseña (mín. 6 caracteres)" required minlength="6" autocomplete="new-password">
          <input type="text" name="address" placeholder="Dirección (calle, número, ciudad, CP)">
          <button type="submit" class="btn btn-primary btn-block">Registrarse</button>
        </form>
        <p class="auth-divider">o continuar con</p>
        <button type="button" id="btn-google-register" class="btn-google" aria-label="Registrarse con Google">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Google
        </button>
        <p id="register-error" class="error-msg"></p>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script>

    // Tabs
    document.querySelectorAll('.tab').forEach(tab => {
      tab.onclick = () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.auth-form').forEach(f => f.classList.add('hidden'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab + '-form').classList.remove('hidden');
      };
    });

    document.getElementById('form-login').onsubmit = async (e) => {
      e.preventDefault();
      const form = e.target;
      const err = document.getElementById('login-error');
      err.textContent = '';
      const { email, password } = Object.fromEntries(new FormData(form));
      const { error } = await Auth.login(email, password);
      if (error) { err.textContent = error; return; }
      const redirect = new URLSearchParams(location.search).get('redirect');
      if (redirect && redirect !== 'admin.html') { location.href = redirect; return; }
      if (await Auth.isAdmin()) location.href = 'admin.html';
      else location.href = redirect || 'index.html';
    };

    document.getElementById('form-register').onsubmit = async (e) => {
      e.preventDefault();
      const form = e.target;
      const err = document.getElementById('register-error');
      err.textContent = '';
      const { name, email, password, phone, address } = Object.fromEntries(new FormData(form));
      const { data, error } = await Auth.register(email, password, (name || '').trim(), address || '');
      if (error) { err.textContent = error; return; }
      if (data?.user) {
        const { error: profileErr } = await Auth.ensureProfile({ full_name: (name || '').trim(), phone: (phone || '').trim() });
        if (profileErr) { err.textContent = profileErr; return; }
      }
      const redirect = new URLSearchParams(location.search).get('redirect');
      if (await Auth.isAdmin()) location.href = 'admin.html';
      else location.href = redirect || 'index.html';
    };

    function handleGoogleAuth(errEl) {
      errEl.textContent = '';
      Auth.loginWithGoogle().then(({ error }) => {
        if (error) errEl.textContent = error;
      });
    }
    document.getElementById('btn-google-login').onclick = () => handleGoogleAuth(document.getElementById('login-error'));
    document.getElementById('btn-google-register').onclick = () => handleGoogleAuth(document.getElementById('register-error'));
  </script>
</body>
</html>
