  <div class="category-bar category-bar--hidden" aria-hidden="true"></div>

  <main class="auth-container profile-page">
    <div id="perfil-require-login" class="auth-card">
      <div class="auth-card-header">
        <h2>Inicia sesión</h2>
        <p></p>
        <a href="login.html?redirect=perfil.html" class="btn btn-primary" style="margin-top:1rem">Iniciar sesión</a>
      </div>
    </div>

    <div id="perfil-form-wrap" class="auth-card hidden" style="max-width: 440px;">
      <div class="auth-card-header">
        <h2>Editar perfil</h2>
        <p>Actualiza tu nombre y teléfono para pedidos y reseñas.</p>
      </div>
      <form id="perfil-form" class="auth-form">
        <label for="perfil-full_name">Nombre completo</label>
        <input type="text" id="perfil-full_name" name="full_name" placeholder="Nombre completo" required autocomplete="name">
        <label for="perfil-phone">Teléfono</label>
        <input type="tel" id="perfil-phone" name="phone" placeholder="Teléfono" required autocomplete="tel">
        <label for="perfil-address">Dirección</label>
        <textarea id="perfil-address" name="address" rows="3" placeholder="Calle, número, edificio, piso, municipio..." style="width:100%;padding:0.95rem 1.2rem;margin-bottom:0.9rem;background:var(--bg-page);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:inherit;font-size:1rem;"></textarea>

        <div style="margin-top: 0.25rem; padding-top: 1rem; border-top: 1px solid var(--border-light);">
          <p class="form-hint" style="margin-top:0">Deja en blanco si no quieres cambiar tu contraseña.</p>
          <div class="password-field">
            <input id="perfil-password" type="password" name="password" placeholder="Nueva contraseña (mín. 6 caracteres)" minlength="6" autocomplete="new-password">
            <button type="button" class="toggle-password" data-toggle-password="#perfil-password" aria-label="Mostrar u ocultar contraseña" title="Mostrar u ocultar contraseña">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
          <div class="password-field">
            <input id="perfil-password-confirm" type="password" name="password_confirm" placeholder="Confirmar nueva contraseña" minlength="6" autocomplete="new-password">
            <button type="button" class="toggle-password" data-toggle-password="#perfil-password-confirm" aria-label="Mostrar u ocultar contraseña" title="Mostrar u ocultar contraseña">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
        </div>

        <p id="perfil-error" class="error-msg"></p>
        <button type="submit" class="btn btn-primary btn-block">Guardar cambios</button>
      </form>
      <div class="perfil-actions">
        <button type="button" id="perfil-logout" class="btn btn-outline btn-block">Cerrar sesión</button>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/perfil.js"></script>
  <script>
    (function setupPasswordToggles(root) {
      root.querySelectorAll('[data-toggle-password]').forEach((btn) => {
        btn.addEventListener('click', () => {
          const selector = btn.getAttribute('data-toggle-password');
          const input = selector ? document.querySelector(selector) : null;
          if (!input) return;
          const willShow = input.type === 'password';
          input.type = willShow ? 'text' : 'password';
          btn.setAttribute('aria-pressed', String(willShow));
        });
      });
    })(document);
  </script>
